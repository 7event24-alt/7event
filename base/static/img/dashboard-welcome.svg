<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#F3F4F6"/>
  
  <!-- Person - Head -->
  <circle cx="100" cy="60" r="25" fill="#FCD34D"/>
  <!-- Hair -->
  <path d="M75 55 Q100 25 125 55" fill="#374151"/>
  <!-- Smile -->
  <path d="M90 68 Q100 75 110 68" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="90" cy="58" r="3" fill="#374151"/>
  <circle cx="110" cy="58" r="3" fill="#374151"/>
  
  <!-- Body/Torso -->
  <path d="M70 90 L70 140 Q70 160 100 160 Q130 160 130 140 L130 90" fill="#1E3A5F"/>
  
  <!-- Arms holding laptop -->
  <path d="M60 110 Q50 120 65 130" stroke="#1E3A5F" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M140 110 Q150 120 135 130" stroke="#1E3A5F" stroke-width="10" stroke-linecap="round" fill="none"/>
  
  <!-- Laptop -->
  <rect x="55" y="115" width="90" height="60" rx="5" fill="#4B5563"/>
  <rect x="60" y="120" width="80" height="50" rx="3" fill="#1E3A5F"/>
  <!-- Screen content -->
  <rect x="65" y="125" width="30" height="20" rx="2" fill="#10B981"/>
  <rect x="100" y="125" width="35" height="20" rx="2" fill="#3B82F6"/>
  <rect x="65" y="150" width="70" height="15" rx="2" fill="#6B7280"/>
  
  <!-- Floating elements -->
  <!-- Check mark -->
  <circle cx="155" cy="50" r="15" fill="#10B981"/>
  <path d="M148 50 L153 55 L163 45" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Chart/graph -->
  <rect x="35" y="45" width="25" height="25" rx="3" fill="#FCD34D"/>
  <path d="M40 65 L40 55 L45 55 L45 60 L50 50 L50 60 L55 55 L55 65" stroke="#374151" stroke-width="2" fill="none"/>
  
  <!-- Small dots decoration -->
  <circle cx="170" cy="90" r="4" fill="#FCD34D"/>
  <circle cx="30" cy="100" r="3" fill="#10B981"/>
  <circle cx="165" cy="120" r="2" fill="#3B82F6"/>
</svg>