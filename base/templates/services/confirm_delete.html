{% extends 'base.html' %}

{% block title %}Excluir Serviço - 7event{% endblock %}
{% block page_title %}Excluir Serviço{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <div class="card-header">
        <h3 class="card-title">Confirmar Exclusão</h3>
    </div>
    <div class="card-body">
        <p>Tem certeza que deseja excluir o serviço <strong>{{ service.name }}</strong>?</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-actions">
                <a href="{% url 'services:list' %}" class="btn btn-outline">Cancelar</a>
                <button type="submit" class="btn btn-danger">Excluir</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
