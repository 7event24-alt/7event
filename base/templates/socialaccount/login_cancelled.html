{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login cancelado - 7event</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center p-4">
    <div class="w-full max-w-md rounded-2xl border border-slate-700 bg-slate-900 shadow-xl p-6">
        <h1 class="text-xl font-bold text-amber-300 mb-2">Login cancelado</h1>
        <p class="text-sm text-slate-300 mb-5">Você cancelou a autenticação com Google. Se quiser, tente novamente.</p>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <a href="/auth/social/google/login/" class="text-center rounded-lg bg-slate-100 text-slate-900 px-4 py-2.5 hover:bg-white transition font-semibold">Tentar novamente</a>
            <a href="/app/accounts/login/" class="text-center rounded-lg border border-slate-600 px-4 py-2.5 hover:bg-slate-800 transition">Login normal</a>
        </div>
    </div>
</body>
</html>
