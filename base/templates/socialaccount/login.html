{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar com Google - 7event</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center p-4">
    <div class="w-full max-w-md rounded-2xl border border-slate-700 bg-slate-900 shadow-xl overflow-hidden">
        <div class="bg-primary px-6 py-5 text-center">
            <img src="{% static 'img/logo7eventbranco.png' %}" alt="7event" class="h-10 mx-auto mb-2">
            <p class="text-white/80 text-sm">Acesso com conta Google</p>
        </div>

        <div class="p-6">
            <h1 class="text-xl font-bold mb-2">Entrar com Google</h1>
            <p class="text-sm text-slate-300 mb-5">Use sua conta Google para entrar rápido no 7event.</p>

            <a href="/auth/social/google/login/" class="w-full inline-flex items-center justify-center gap-3 rounded-lg border border-slate-600 bg-white text-gray-800 px-4 py-3 hover:bg-gray-100 transition font-semibold">
                <i class="fab fa-google text-red-500"></i>
                Continuar com Google
            </a>

            <div class="mt-5 text-sm text-slate-400">
                <a href="/app/accounts/login/" class="text-primary hover:underline">Voltar para login normal</a>
            </div>
        </div>
    </div>
    <style>.bg-primary { background-color: #1e3a5f; }</style>
</body>
</html>
