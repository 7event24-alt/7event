{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}7event - Senha Alterada{% endblock %}</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a5f',
                        secondary: '#2d5a8a',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS0KV-uNj-loGnPp5R2pRaH0UWas-tNSZ_YzA&s');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">
    <div class="bg-wrapper"></div>
    <div class="absolute inset-0 bg-primary/80 backdrop-blur-md"></div>
    <div class="w-full max-w-md relative z-10">
        <div class="bg-white rounded-2xl shadow-[0_0_30px_rgba(0,0,0,0.4)]">
            <div class="bg-primary p-8 text-center rounded-t-2xl">
                <img src="{% static 'img/logo7eventbranco.png' %}" alt="7event" class="h-12 mx-auto mb-2">
                <p class="text-white/80 text-sm">Sistema de Gestão de Eventos</p>
            </div>
            
            <div class="p-8">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-check text-green-600 text-2xl"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800">Senha Alterada!</h2>
                    <p class="text-gray-600 mt-2 text-sm">Sua senha foi redefinida com sucesso.</p>
                </div>
                
                <div class="text-center">
                    <a href="{% url 'login' %}" class="inline-block w-full bg-primary text-white py-3 px-4 rounded-lg hover:bg-secondary transition font-medium">
                        <i class="fas fa-sign-in-alt"></i> Fazer Login
                    </a>
                </div>
            </div>
            
            <div class="bg-gray-50 px-8 py-4 text-center">
                <p class="text-xs text-gray-500">© 2025 7event - Sistema de Gestão de Eventos</p>
            </div>
        </div>
    </div>
</body>
</html>
