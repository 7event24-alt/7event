{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Realizado - 7event</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a5f',
                        secondary: '#2d5a8a',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gray-50">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-lg p-8 text-center">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-envelope text-3xl text-green-600"></i>
            </div>
            
            <h1 class="text-2xl font-bold text-gray-800 mb-4">Cadastro Realizado!</h1>
            
            <p class="text-gray-600 mb-6">
                Enviamos um email de verificação para 
                <span class="font-semibold text-primary">{{ email }}</span>
            </p>
            
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                <p class="text-sm text-blue-700">
                    <i class="fas fa-info-circle mr-2"></i>
                    Verifique sua caixa de entrada (e também na pasta de spam) e clique no link para ativar sua conta.
                </p>
            </div>
            
            <div class="mb-4">
                <button id="resendBtn" onclick="resendEmail()" disabled class="w-full bg-gray-300 text-gray-500 py-3 px-4 rounded-lg font-medium cursor-not-allowed flex items-center justify-center gap-2 transition">
                    <i class="fas fa-envelope"></i> <span id="resendText">Aguarde 60 segundos para reenviar</span>
                </button>
            </div>
            
            <a href="{% url 'accounts:login' %}" class="inline-block w-full border border-gray-300 text-gray-700 py-3 px-4 rounded-lg hover:bg-gray-50 transition font-medium">
                <i class="fas fa-sign-in-alt mr-2"></i> Ir para Login
            </a>
        </div>
    </div>
    
    <script>
        let countdown = 60;
        const resendBtn = document.getElementById('resendBtn');
        const resendText = document.getElementById('resendText');
        
        const timer = setInterval(() => {
            countdown--;
            if (countdown > 0) {
                resendText.textContent = `Aguarde ${countdown} segundos para reenviar`;
            } else {
                clearInterval(timer);
                resendBtn.disabled = false;
                resendBtn.classList.remove('bg-gray-300', 'text-gray-500', 'cursor-not-allowed');
                resendBtn.classList.add('bg-primary', 'text-white', 'hover:bg-secondary');
                resendText.textContent = 'Reenviar email de ativação';
            }
        }, 1000);
        
        function resendEmail() {
            window.location.href = "{% url 'accounts:resend_activation' %}?email={{ email }}";
        }
    </script>
</body>
</html>
