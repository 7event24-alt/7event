{% load static %}{% load version_tags %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}7event{% endblock %}</title>
    <link rel="manifest" href="{% static 'manifest.webmanifest' %}">
    <link rel="icon" type="image/png" href="https://www.7event.com.br/static/img/logo7event.png">
    <!-- iOS -->
    <link rel="apple-touch-icon" href="https://www.7event.com.br/static/img/logo7event.png">
    <link rel="apple-touch-icon" sizes="57x57" href="https://www.7event.com.br/static/img/logo7event.png">
    <link rel="apple-touch-icon" sizes="72x72" href="https://www.7event.com.br/static/img/logo7event.png">
    <link rel="apple-touch-icon" sizes="114x114" href="https://www.7event.com.br/static/img/logo7event.png">
    <link rel="apple-touch-icon" sizes="120x120" href="https://www.7event.com.br/static/img/logo7event.png">
    <link rel="apple-touch-icon" sizes="152x152" href="https://www.7event.com.br/static/img/logo7event.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Android -->
    <link rel="icon" sizes="192x192" href="https://www.7event.com.br/static/img/logo7event.png">
    <link rel="icon" sizes="128x128" href="https://www.7event.com.br/static/img/logo7event.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e3a5f">
    <!-- Windows -->
    <meta name="msapplication-TileImage" content="https://www.7event.com.br/static/img/logo7event.png">
    <meta name="msapplication-TileColor" content="#1e3a5f">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a5f',
                        secondary: '#2d5a8a',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- Botão de Instalação PWA -->
    <button id="pwa-install-btn" hidden class="fixed bottom-4 right-4 bg-primary hover:bg-secondary text-white px-4 py-3 rounded-full shadow-lg z-50 flex items-center gap-2">
        <i class="fas fa-download"></i>
        <span>Instalar App</span>
    </button>
    <!-- Header Simples -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="{% url 'landingpage:index' %}" class="flex items-center gap-3 hover:opacity-80 transition">
                    <img src="{% static 'img/logo7event.png' %}" alt="7event" class="h-10">
                </a>
                <nav class="flex items-center gap-4">
                    <a href="{% url 'landingpage:index' %}" class="text-gray-600 hover:text-primary font-medium transition-colors">
                        Início
                    </a>
                    <a href="{% url 'landingpage:index' %}#planos" class="text-gray-600 hover:text-primary font-medium transition-colors">
                        Planos
                    </a>
                    <a href="{% url 'support:contact' %}" class="text-gray-600 hover:text-primary font-medium transition-colors">
                        Suporte
                    </a>
                    {% if user.is_authenticated %}
                    <a href="{% url 'dashboard:home' %}" class="bg-primary hover:bg-secondary text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                        Dashboard
                    </a>
                    {% else %}
                    <a href="{% url 'accounts:login' %}" class="text-gray-600 hover:text-primary font-medium transition-colors">
                        Entrar
                    </a>
                    <a href="{% url 'accounts:register' %}" class="bg-primary hover:bg-secondary text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                        Cadastrar
                    </a>
                    {% endif %}
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer Simples -->
    <footer class="bg-gray-900 text-white py-8 mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <img src="{% static 'img/logo7eventbranco.png' %}" alt="7event" class="h-8">
                    <span class="text-gray-400 text-sm">© 2025 7event - Sistema de Gestão de Eventos</span>
                </div>
                <div class="flex gap-6">
                    <a href="/" class="text-gray-400 hover:text-white text-sm transition-colors">FAQ</a>
                    <a href="{% url 'support:contact' %}" class="text-gray-400 hover:text-white text-sm transition-colors">Suporte</a>
                    <a href="#" class="text-gray-400 hover:text-white text-sm transition-colors">Termos</a>
                    <a href="#" class="text-gray-400 hover:text-white text-sm transition-colors">Privacidade</a>
                </div>
            </div>
        </div>
    </footer>
    <!-- PWA Install -->
    <script>
    let deferredPrompt;
    const pwaInstallBtn = document.getElementById('pwa-install-btn');
    
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
        if(pwaInstallBtn) pwaInstallBtn.hidden = true;
    } else if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        if(pwaInstallBtn) pwaInstallBtn.hidden = false;
    }
    
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if(pwaInstallBtn) pwaInstallBtn.hidden = false;
    });
    pwaInstallBtn?.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            if(pwaInstallBtn) pwaInstallBtn.hidden = true;
        }
    });
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('{% static "sw.js" %}').catch(() => {});
    }
    </script>
</body>
</html>
