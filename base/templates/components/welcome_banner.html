{% load static %}
<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 lg:p-8 mb-6">
    <div class="flex flex-col lg:flex-row items-center justify-between gap-6">
        <!-- Lado esquerdo - Conteúdo textual -->
        <div class="flex-1">
            <p class="text-gray-500 text-sm mb-2">
                Olá, <span class="font-semibold text-gray-700">{{ user.first_name|default:user.username }}!</span> 👋
            </p>
            <h2 class="text-2xl lg:text-3xl font-bold text-gray-900">
                Vamos organizar seu dia?
            </h2>
            <p class="text-gray-500 mt-2 text-sm lg:text-base">
                Você tem <span class="text-amber-600 font-semibold">{% if jobs_pending > 0 %}{{ jobs_pending }}{% else %}0{% endif %} trabalho(s) pendente(s)</span> esperando por você.
            </p>
        </div>
        
        <!-- Lado direito - Ilustração -->
        <div class="relative w-32 h-32 lg:w-40 lg:h-40 flex-shrink-0">
            <img src="{% static 'img/dashboard-welcome.svg' %}" alt="Dashboard" class="w-full h-full">
        </div>
    </div>
</div>
