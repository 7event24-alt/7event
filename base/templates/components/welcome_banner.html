{% load static %}
<div class="flex flex-row items-center justify-between gap-6">
    <!-- Lado direito - Ilustração (visualmente primeiro no desktop) -->
    <div class="w-28 h-28 lg:w-44 lg:h-44 flex-shrink-0">
        <!-- Mobile: usa imagem menor -->
        <img src="{% static 'img/dashboard-welcome-mobile.png' %}" alt="Dashboard" class="w-full h-full object-contain lg:hidden">
        <!-- Desktop: usa imagem maior -->
        <img src="{% static 'img/dashboard-welcome.png' %}" alt="Dashboard" class="w-full h-full object-contain hidden lg:block">
    </div>
    
    <!-- Lado esquerdo - Conteúdo textual (visualmente segundo no desktop) -->
    <div class="flex-1 text-right lg:text-left">
        <p class="text-gray-500 text-sm mb-2">
            Olá, <span class="font-semibold text-gray-700">{{ user.first_name|default:user.username }}</span> 👋
        </p>
        <h2 class="text-2xl lg:text-3xl font-bold text-gray-900">
            Vamos organizar seu dia?
        </h2>
    </div>
</div>
